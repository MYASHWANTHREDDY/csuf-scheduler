<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found</title>
  <style>
    body { font-family: Inter, "Segoe UI", Arial, sans-serif; background: #f8fafc; color: #0f172a; margin: 0; }
    .wrap { min-height: 100vh; display: grid; place-items: center; padding: 24px; }
    .card { max-width: 520px; width: 100%; background: #fff; border: 1px solid #dbe2ea; border-radius: 12px; padding: 24px; box-shadow: 0 8px 22px rgba(15,23,42,0.06); }
    h1 { margin: 0 0 10px 0; font-size: 28px; }
    p { margin: 0 0 18px 0; color: #475569; }
    .actions { display:flex; gap:10px; flex-wrap:wrap; }
    a { display: inline-block; background: #1d4ed8; color: #fff; text-decoration: none; padding: 10px 14px; border-radius: 8px; }
    a:hover { background: #1e40af; }
    a.secondary { background:#fff; color:#0f172a; border:1px solid #dbe2ea; }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card" aria-labelledby="title">
      <h1 id="title">404 — Page Not Found</h1>
      <p>The page you requested does not exist or may have moved.</p>
      <div class="actions">
        <a href="/">Return to Dashboard</a>
        <a class="secondary" href="mailto:support@example.com?subject=CSUF%20Scheduler%20404%20Issue">Report Issue</a>
      </div>
    </section>
  </main>
</body>
</html>
