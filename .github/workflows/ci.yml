name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: csuf
          POSTGRES_PASSWORD: csufpass
          POSTGRES_DB: scheduler
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U csuf -d scheduler"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Wait for Postgres (python)
        env:
          DATABASE_URL: postgresql://csuf:csufpass@localhost:5432/scheduler
        run: |
          python - <<'PY'
          import os, time, sys
          import psycopg2

          dsn = os.environ.get('DATABASE_URL')
          for i in range(30):
              try:
                  conn = psycopg2.connect(dsn)
                  conn.close()
                  print('Postgres is ready')
                  sys.exit(0)
              except Exception as e:
                  print('Waiting for Postgres...', i, str(e))
                  time.sleep(2)
          print('Postgres did not become ready in time', file=sys.stderr)
          sys.exit(1)
          PY

      - name: Run migrations
        env:
          DATABASE_URL: postgresql://csuf:csufpass@localhost:5432/scheduler
        run: |
          alembic -c alembic.ini upgrade head

      - name: Run tests
        env:
          DATABASE_URL: postgresql://csuf:csufpass@localhost:5432/scheduler
          PYTHONPATH: .
        run: |
          pytest -q tests

  migrate-container:
    name: Migrate inside built image
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: csuf
          POSTGRES_PASSWORD: csufpass
          POSTGRES_DB: scheduler
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U csuf -d scheduler"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Build migrate image
        run: |
          docker build -f backend/Dockerfile -t csuf-scheduler-migrate:ci backend

      - name: Wait for Postgres (python)
        env:
          DATABASE_URL: postgresql://csuf:csufpass@localhost:5432/scheduler
        run: |
          python - <<'PY'
          import os, time, sys
          import psycopg2

          dsn = os.environ.get('DATABASE_URL')
          for i in range(30):
              try:
                  conn = psycopg2.connect(dsn)
                  conn.close()
                  print('Postgres is ready')
                  sys.exit(0)
              except Exception as e:
                  print('Waiting for Postgres...', i, str(e))
                  time.sleep(2)
          print('Postgres did not become ready in time', file=sys.stderr)
          sys.exit(1)
          PY

      - name: Run containerized migrations
        run: |
          # run the migrate image; use host networking so the container can reach the job Postgres service
          docker run --rm --network host -e DATABASE_URL=postgresql://csuf:csufpass@localhost:5432/scheduler csuf-scheduler-migrate:ci alembic upgrade head
