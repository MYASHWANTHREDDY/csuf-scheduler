services:
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: csuf
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: scheduler
    volumes:
      - db_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    restart: unless-stopped

  web:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./backend/.env.prod
    ports:
      - "5000:5000"
    depends_on:
      - db
      - redis

  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env.prod
    command: ["alembic", "upgrade", "head"]
    depends_on:
      - db

volumes:
  db_data:
